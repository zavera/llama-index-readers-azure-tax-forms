name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── FERPA / PII controls ────────────────────────────────────────────────────
# 1. No real tax documents are stored in this repo (samples/*.pdf is gitignored).
# 2. Unit tests use only mocked Azure DI responses — no real credentials needed.
# 3. Secrets are never logged. The AZURE_DI_* secrets below are only used in
#    the optional integration job, which is skipped on PRs from forks.
# 4. Audit logs are never uploaded as artifacts (they may contain document names).
# 5. Step names and log output contain no student or taxpayer PII.
# ────────────────────────────────────────────────────────────────────────────

jobs:
  # --------------------------------------------------------------------------
  # Unit tests — runs on every push and PR, no credentials required.
  # All Azure DI calls are mocked; no real documents are processed.
  # --------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install llama-index-core azure-ai-formrecognizer pypdf Pillow
          pip install pytest pytest-asyncio pytest-mock
          pip install -e .

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # --------------------------------------------------------------------------
  # Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/ tests/

  # --------------------------------------------------------------------------
  # Integration test — only runs on pushes to main from the upstream repo.
  # Skipped on fork PRs (secrets are not available to forks).
  # Uses real Azure DI credentials stored as GitHub repository secrets.
  #
  # FERPA note: integration tests use only the fake-filled IRS sample forms
  # generated by samples/generate_samples.py — no real taxpayer data.
  # Audit logs produced during this job are not uploaded as artifacts.
  # --------------------------------------------------------------------------
  integration-test:
    name: Integration test (real Azure DI)
    runs-on: ubuntu-latest
    # Only run when secrets are available — skips on fork PRs automatically
    if: github.event_name == 'push' && github.repository == 'zavera/llama-index-readers-azure-tax-forms'
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install llama-index-core azure-ai-formrecognizer pypdf Pillow reportlab
          pip install -e .

      - name: Generate fake sample PDFs
        # Generates filled IRS templates with fictional data — no real PII
        run: |
          cd samples
          python generate_samples.py

      - name: Run integration test
        # Secrets are masked in logs by GitHub Actions automatically.
        # Document content is never printed — only metadata (kv_count, stage, ms).
        env:
          AZURE_DI_ENDPOINT: ${{ secrets.AZURE_DI_ENDPOINT }}
          AZURE_DI_KEY: ${{ secrets.AZURE_DI_KEY }}
        run: |
          python test_real.py \
            samples/f1040_filled.pdf \
            samples/fw2_filled.pdf \
            samples/f1040sc_filled.pdf \
            samples/f1040se_filled.pdf \
            samples/f1065sk1_filled.pdf

      # Audit logs deliberately NOT uploaded — they contain document names
      # which may be sensitive in production deployments.
